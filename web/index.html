<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>moonsic — Browser Playback</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <h1>moonsic</h1>
    <p class="subtitle">MoonBit Music Library — Browser Demo</p>
    <div id="controls">
      <button id="play-btn">Play</button>
      <button id="stop-btn" disabled>Stop</button>
      <button id="loop-btn">Loop: OFF</button>
      <span id="status">idle</span>
    </div>
    <div id="info">
      <p>v2: I-V-vi-IV + arpeggio + drums</p>
    </div>
  </div>
  <script src="demo-events.js"></script>
  <script src="app.js"></script>
</body>
</html>
